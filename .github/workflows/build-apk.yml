name: Build and Export Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        working-directory: ./travel-pilot
        run: npm install

      - name: Prebuild Android (Generate native code)
        working-directory: ./travel-pilot
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1
        run: npx --yes expo prebuild --platform android --clean --no-install

      - name: Build APK (Assemble Release)
        working-directory: ./travel-pilot/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Copy APK to Landing Page
        run: cp travel-pilot/android/app/build/outputs/apk/release/app-release.apk landing-page/app-release.apk

      - name: Commit and Push APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f landing-page/app-release.apk
          git commit -m "chore: update build-apk [skip ci]"
          git push
