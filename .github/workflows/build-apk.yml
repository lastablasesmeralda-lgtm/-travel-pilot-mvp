name: Build and Export Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './travel-pilot/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        working-directory: ./travel-pilot
        run: npm install

      - name: Prebuild Android (Generate native code)
        working-directory: ./travel-pilot
        run: npx expo prebuild --platform android --clean

      - name: Build APK (Assemble Release)
        working-directory: ./travel-pilot/android
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TravelPilot-App-APK
          path: travel-pilot/android/app/build/outputs/apk/release/app-release.apk
